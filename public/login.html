<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login – WhatsApp Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container" style="max-width:480px;margin-top:60px;">
    <div class="card shadow">
        <div class="card-body">
            <h4 class="text-center mb-4">Portal Login</h4>

            <div id="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <input type="text" name="username" class="form-control"
                           placeholder="Username" required>
                </div>

                <div class="mb-3">
                    <input type="password" name="password" class="form-control"
                           placeholder="Password" required>
                </div>

                <button class="btn btn-primary w-100">Login</button>
            </form>

            <div class="mt-3 text-muted small">
                Scan QR or <a href="/auth/qr" target="_blank">Click here</a> to connect WhatsApp if required.
            </div>
        </div>
    </div>
</div>

<script>
function doLogin() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.ok) {
            window.location = "dashboard.html";
        } else {
            alert(data.error);
        }
    });
}
</script>
</body>
</html>
